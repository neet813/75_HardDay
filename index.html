<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>75 Hard Day Challenge - Plant Growth Worlds</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ocean-light: #A8D5F7;
            --ocean-mid: #5DA3D5;
            --ocean-dark: #2E5A8C;
            --ocean-very-dark: #1A3A5C;
            --land-light: #F4C4D4;
            --land-mid: #E89BAD;
            --land-dark: #D1748A;
            --coral-red: #FF6B6B;
            --seaweed-green: #4A9B6F;
            --sand-beige: #F5DEB3;
            --plant-green: #7CB342;
            --dark-green: #1B5E20;
            --sky-yellow: #FFD700;
            --flower-pink: #FF69B4;
            --white: #FFFFFF;
            --gray: #CCCCCC;
            --dark-gray: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--ocean-light) 0%, var(--land-light) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .world-screen {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 800px;
            transition: transform 0.3s ease;
        }

        .world-screen:hover {
            transform: translateY(-5px);
        }

        /* OCEAN WORLD */
        .ocean-screen {
            background: linear-gradient(180deg, var(--ocean-light) 0%, var(--ocean-mid) 100%);
        }

        .header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--ocean-mid);
            color: white;
        }

        .health-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            color: var(--ocean-mid);
        }

        .header-icons {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        .terrain {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .creatures {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .creature {
            position: absolute;
            animation: swim 4s ease-in-out infinite;
        }

        @keyframes swim {
            0% { transform: translateX(-100px); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }

        .fish { font-size: 24px; animation-delay: 0s; }
        .whale { font-size: 32px; animation-delay: 1s; animation-duration: 5s; }

        .task-card {
            margin: 16px;
            padding: 16px;
            background: var(--ocean-light);
            border-radius: 16px;
            border: 2px solid var(--ocean-mid);
        }

        .task-date {
            font-size: 12px;
            font-weight: 600;
            color: var(--ocean-mid);
        }

        .task-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark-gray);
            margin-top: 4px;
        }

        .task-description {
            font-size: 12px;
            color: var(--dark-gray);
            margin: 8px 0;
            line-height: 1.5;
        }

        .progress-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--ocean-mid);
        }

        .progress-dot.empty {
            background: var(--gray);
        }

        .progress-line {
            flex: 1;
            height: 4px;
            background: var(--gray);
            border-radius: 2px;
        }

        .collectibles {
            display: flex;
            justify-content: center;
            gap: 32px;
            padding: 12px 0;
        }

        .collectible-item {
            text-align: center;
        }

        .collectible-emoji {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }

        .collectible-count {
            font-size: 14px;
            font-weight: 600;
            color: var(--dark-gray);
        }

        /* LAND WORLD */
        .land-screen {
            background: linear-gradient(180deg, var(--land-light) 0%, var(--land-mid) 100%);
        }

        .land-header {
            padding: 16px 20px;
            background: var(--land-mid);
            color: white;
            font-size: 18px;
            font-weight: 700;
        }

        .palm-trees {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 40px;
        }

        .palm-tree {
            font-size: 40px;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(2px) rotate(1deg); }
        }

        .sky-elements {
            position: absolute;
            top: 40px;
            right: 40px;
            font-size: 28px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .birds {
            position: absolute;
            top: 80px;
            left: 100px;
            display: flex;
            gap: 20px;
            animation: fly 6s ease-in-out infinite;
        }

        @keyframes fly {
            0% { transform: translateX(0); }
            50% { transform: translateX(40px); }
            100% { transform: translateX(0); }
        }

        .airplane {
            position: absolute;
            top: 120px;
            right: -50px;
            font-size: 32px;
            animation: fly-across 7s ease-in-out infinite;
        }

        @keyframes fly-across {
            0% { right: -50px; top: 120px; }
            50% { right: 50%; top: 100px; }
            100% { right: calc(100% + 50px); top: 120px; }
        }

        .orca {
            position: absolute;
            bottom: 200px;
            left: -100px;
            font-size: 48px;
            animation: swim-orca 8s ease-in-out infinite;
        }

        @keyframes swim-orca {
            0% { left: -100px; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { left: calc(100vw + 100px); opacity: 0; }
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            padding: 16px;
            margin: 0 16px;
        }

        .task-grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .task-grid-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--dark-gray);
        }

        .task-grid-box {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            background: var(--gray);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .task-grid-box:hover {
            transform: scale(1.05);
        }

        .task-grid-box.completed {
            background: var(--flower-pink);
        }

        .bottom-icons {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 16px;
        }

        .bottom-icon {
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .bottom-icon:hover {
            transform: scale(1.2);
        }

        /* TAB INDICATOR */
        .tab-indicator {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .tab-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-dot.active {
            background: white;
            transform: scale(1.3);
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            .world-screen {
                height: 600px;
            }
        }

        @media (max-width: 768px) {
            .world-screen {
                height: 500px;
                border-radius: 16px;
            }
            .header, .land-header {
                padding: 12px 16px;
            }
            .icon-btn {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
            .task-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 8px;
                padding: 12px;
                margin: 0 12px;
            }
            .collectibles {
                gap: 24px;
            }
            .palm-trees {
                padding: 30px 20px;
                gap: 15px;
            }
            .palm-tree {
                font-size: 32px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        /* INFO SECTION */
        .info-section {
            margin-top: 40px;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .info-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark-gray);
            margin-bottom: 16px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .info-card {
            padding: 16px;
            background: linear-gradient(135deg, var(--ocean-light) 0%, var(--land-light) 100%);
            border-radius: 12px;
            border: 2px solid var(--ocean-mid);
        }

        .info-label {
            font-size: 12px;
            color: var(--ocean-mid);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark-gray);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- OCEAN WORLD -->
        <div class="world-screen ocean-screen fade-in">
            <div class="header">
                <div class="health-bar">
                    <span>❤️</span>
                    <span>1000+</span>
                </div>
                <div class="header-icons">
                    <button class="icon-btn">⚙️</button>
                    <button class="icon-btn">📋</button>
                    <button class="icon-btn">≡</button>
                    <button class="icon-btn">➕</button>
                </div>
            </div>

            <div class="terrain">
                <svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">
                    <defs>
                        <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--ocean-light);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:var(--ocean-mid);stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="sandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--sand-beige);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#E8D7A0;stop-opacity:1" />
                        </linearGradient>
                    </defs>

                    <!-- Water -->
                    <rect width="400" height="400" fill="url(#oceanGradient)" />

                    <!-- Bubbles -->
                    <circle cx="80" cy="60" r="12" fill="var(--ocean-light)" opacity="0.4" />
                    <circle cx="320" cy="100" r="8" fill="var(--ocean-light)" opacity="0.3" />
                    <circle cx="200" cy="80" r="6" fill="var(--ocean-light)" opacity="0.35" />

                    <!-- Sand base -->
                    <polygon points="0,300 200,250 400,300 200,350" fill="url(#sandGradient)" />
                    <polygon points="0,300 200,250 200,350 0,400" fill="#D4C5A0" />
                    <polygon points="400,300 200,250 200,350 400,400" fill="#E8D7A0" />

                    <!-- Seaweed -->
                    <path d="M 60 300 Q 55 280 60 260 Q 65 240 60 220" stroke="var(--seaweed-green)" stroke-width="8" fill="none" stroke-linecap="round" />
                    <path d="M 100 300 Q 95 270 100 240 Q 105 210 100 180" stroke="var(--seaweed-green)" stroke-width="6" fill="none" stroke-linecap="round" />
                    <path d="M 140 300 Q 135 285 140 270" stroke="var(--seaweed-green)" stroke-width="5" fill="none" stroke-linecap="round" />

                    <!-- Coral -->
                    <path d="M 50 320 L 50 300 L 35 300 M 50 310 L 65 310" stroke="var(--coral-red)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="30" cy="310" r="4" fill="var(--coral-red)" />
                    <circle cx="70" cy="310" r="4" fill="var(--coral-red)" />

                    <!-- Yellow seaweed -->
                    <path d="M 180 300 Q 175 270 180 240" stroke="#D4AF37" stroke-width="5" fill="none" stroke-linecap="round" />
                </svg>

                <!-- Animated creatures -->
                <div class="creatures">
                    <div class="creature fish" style="top: 120px;">🐟</div>
                    <div class="creature whale" style="top: 180px;">🐋</div>
                </div>
            </div>

            <div class="task-card">
                <div class="task-date">3/25/25</div>
                <div class="task-title">Drink water daily</div>
                <div class="task-description">5 times a week<br>1 times a day</div>
                <div class="progress-bar">
                    <div class="progress-dot"></div>
                    <div class="progress-line"></div>
                    <div class="progress-dot empty"></div>
                </div>
            </div>

            <div class="collectibles">
                <div class="collectible-item">
                    <span class="collectible-emoji">⭐</span>
                    <span class="collectible-count">3</span>
                </div>
                <div class="collectible-item">
                    <span class="collectible-emoji">💛</span>
                    <span class="collectible-count">2</span>
                </div>
            </div>

            <div class="tab-indicator">
                <div class="tab-dot active"></div>
                <div class="tab-dot"></div>
            </div>
        </div>

        <!-- LAND WORLD -->
        <div class="world-screen land-screen fade-in">
            <div class="land-header">
                Day 25 / 75
            </div>

            <div class="terrain">
                <svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">
                    <defs>
                        <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:var(--land-light);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:var(--land-mid);stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="groundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#F9D9E5;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#E8A8C8;stop-opacity:1" />
                        </linearGradient>
                    </defs>

                    <!-- Sky -->
                    <rect width="400" height="400" fill="url(#skyGradient)" />

                    <!-- Moon -->
                    <circle cx="320" cy="60" r="25" fill="var(--sky-yellow)" opacity="0.8" />

                    <!-- Ground -->
                    <polygon points="0,280 200,230 400,280 200,330" fill="url(#groundGradient)" />
                    <polygon points="0,280 200,230 200,330 0,380" fill="#E8A8C8" />
                    <polygon points="400,280 200,230 200,330 400,380" fill="#F9D9E5" />

                    <!-- Palm trees -->
                    <g>
                        <rect x="58" y="290" width="4" height="30" fill="#8B7355" />
                        <circle cx="60" cy="260" r="15" fill="var(--plant-green)" opacity="0.8" />
                        <circle cx="45" cy="270" r="12" fill="var(--dark-green)" opacity="0.7" />
                        <circle cx="75" cy="270" r="12" fill="var(--dark-green)" opacity="0.7" />
                    </g>
                    <g>
                        <rect x="118" y="290" width="4" height="32" fill="#8B7355" />
                        <circle cx="120" cy="258" r="16" fill="var(--plant-green)" opacity="0.8" />
                    </g>
                    <g>
                        <rect x="178" y="280" width="4" height="28" fill="#8B7355" />
                        <circle cx="180" cy="252" r="14" fill="var(--plant-green)" opacity="0.8" />
                    </g>
                    <g>
                        <rect x="238" y="290" width="4" height="31" fill="#8B7355" />
                        <circle cx="240" cy="259" r="15" fill="var(--plant-green)" opacity="0.8" />
                    </g>
                    <g>
                        <rect x="298" y="285" width="4" height="29" fill="#8B7355" />
                        <circle cx="300" cy="256" r="14" fill="var(--plant-green)" opacity="0.8" />
                    </g>
                </svg>

                <!-- Animated elements -->
                <div class="sky-elements">🌙</div>
                <div class="birds">
                    <span>🦅</span>
                    <span>🦅</span>
                    <span>🦅</span>
                </div>
                <div class="airplane">✈️</div>
                <div class="orca">🦈</div>
            </div>

            <!-- Task completion grid -->
            <div class="task-grid">
                <div class="task-grid-item">
                    <div class="task-grid-label">1/1</div>
                    <div class="task-grid-box completed"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">1/2</div>
                    <div class="task-grid-box completed"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">2/2</div>
                    <div class="task-grid-box"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">2/2</div>
                    <div class="task-grid-box"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">1/2</div>
                    <div class="task-grid-box completed"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">2/2</div>
                    <div class="task-grid-box"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">2/2</div>
                    <div class="task-grid-box completed"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">1/2</div>
                    <div class="task-grid-box"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">2/2</div>
                    <div class="task-grid-box completed"></div>
                </div>
                <div class="task-grid-item">
                    <div class="task-grid-label">2/2</div>
                    <div class="task-grid-box"></div>
                </div>
            </div>

            <!-- Bottom decorative icons -->
            <div class="bottom-icons">
                <span class="bottom-icon">🌙</span>
                <span class="bottom-icon">🦈</span>
                <span class="bottom-icon">🦅</span>
            </div>

            <div class="tab-indicator">
                <div class="tab-dot"></div>
                <div class="tab-dot active"></div>
            </div>
        </div>
    </div>

    <!-- Information Section -->
    <div class="info-section">
        <h2 class="info-title">🎯 75 Hard Day Challenge</h2>
        <div class="info-grid">
            <div class="info-card">
                <div class="info-label">🌊 OCEAN WORLD</div>
                <div class="info-value">5 Tasks</div>
            </div>
            <div class="info-card">
                <div class="info-label">🌴 LAND WORLD</div>
                <div class="info-value">10 Tasks</div>
            </div>
            <div class="info-card">
                <div class="info-label">📈 PROGRESS</div>
                <div class="info-value">Day 25</div>
            </div>
            <div class="info-card">
                <div class="info-label">🏆 STREAK</div>
                <div class="info-value">24 Days</div>
            </div>
        </div>
    </div>

    <script>
        // Interactive task grid
        const taskGridBoxes = document.querySelectorAll('.task-grid-box');
        taskGridBoxes.forEach((box) => {
            box.addEventListener('click', () => {
                box.classList.toggle('completed');
            });
        });

        // Animate creatures on page load
        const creatures = document.querySelectorAll('.creature');
        creatures.forEach((creature, index) => {
            creature.style.animationDelay = `${index * 1.5}s`;
        });

        console.log('✅ 75 Hard Day Challenge UI Loaded Successfully');
    </script>
</body>
</html>
